repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files  # prevents committing massive files
      - id: check-case-conflict      # filenameing for case-insensitive filesystems
      - id: check-yaml               # checks YAML syntax
      - id: debug-statements         # check for breakpoint() and debug imports
      - id: end-of-file-fixer        # ensures files end with a newline
      - id: trailing-whitespace      # trims trailing whitespace
        args: [--markdown-linebreak-ext=md]
      - id: name-tests-test          # verifies that test files are named correctly
        args: [--pytest-test-first]


  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check               # run ruff linter
        types_or: [ python, pyi, jupyter ]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell                # find common misspellings
        args: [-L, "shs,nd"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.2.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports]
